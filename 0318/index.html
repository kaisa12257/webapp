<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회장님 리액트 프로젝트</title>
    <style>
        body { margin: 0; background-color: #282c34; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .logo { height: 40vmin; animation: spin infinite 20s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        a { color: #61dafb; text-decoration: none; margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <svg class="logo" viewBox="0 0 841.9 596.6" xmlns="http://www.w3.org/2000/svg">
        <circle cx="420.9" cy="298.3" r="23.1" fill="#61dafb"/>
        <g fill="none" stroke="#61dafb" stroke-width="20">
            <ellipse rx="390.4" ry="147.1" transform="rotate(0 420.9 298.3)" cx="420.9" cy="298.3"/>
            <ellipse rx="390.4" ry="147.1" transform="rotate(60 420.9 298.3)" cx="420.9" cy="298.3"/>
            <ellipse rx="390.4" ry="147.1" transform="rotate(120 420.9 298.3)" cx="420.9" cy="298.3"/>
        </g>
    </svg>
    <p>리액트 로고 가동 중!</p>
    <a href="https://reactjs.org" target="_blank">Learn React</a>
</body>
</html>
