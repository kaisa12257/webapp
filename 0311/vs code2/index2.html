<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA 예제</title>
    
    <style>
        /* style.css 내용 */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        nav {
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
            color: blue;
            cursor: pointer;
        }
        nav a:hover {
            text-decoration: underline;
        }
        #app {
            border: 1px solid #ddd;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" onclick="navigate('home')">Home</a>
        <a href="#" onclick="navigate('about')">About</a>
        <a href="#" onclick="navigate('contact')">Contact</a>
    </nav>

    <div id="app">
        <h2>Welcome to SPA</h2>
        <p>여기에 페이지 내용이 표시됩니다.</p>
    </div>

    <script>
        /* app.js 내용 */
        // 1. 데이터 정의 (이 부분이 navigate 함수 위에 있어야 합니다)
        const routes = {
            home: "<h2>Home</h2><p>홈 페이지입니다.</p>",
            about: "<h2>About</h2><p>회사 소개 페이지입니다.</p>",
            contact: "<h2>Contact</h2><p>연락처 페이지입니다.</p>"
        };

        // 2. 페이지 전환 함수 (수정 완료)
        function navigate(page) {
            // routes 객체에서 해당 페이지의 HTML을 가져옵니다.
            const content = routes[page] || "<h2>404</h2><p>페이지를 찾을 수 없습니다.</p>";
            
            // #app 영역의 내용을 교체합니다.
            document.getElementById("app").innerHTML = content;

            // URL 주소를 변경하여 뒤로가기 기능을 지원합니다.
            window.history.pushState({ page }, page, `#${page}`);
        }

        // 3. 브라우저의 뒤로가기/앞으로가기 이벤트 처리
        window.onpopstate = function(event) {
            if (event.state && event.state.page) {
                const page = event.state.page;
                document.getElementById("app").innerHTML = routes[page];
            }
        };
    </script>

</body>
</html>
